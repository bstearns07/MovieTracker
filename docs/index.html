<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Movie List</title>
    <link rel="stylesheet" href="movie_list.css">
</head>

<body>
    <div id="form">
        <h1>Movie List</h1>
        <div>
            <label for="title">Title:</label>
            <input type="text" name="title" id="title">
        </div>
        <div>
            <label for="genre">Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>
            </select>
        </div>
        <div>
            <label for="rating">Rating (1-10):</label>
            <input type="number" id="rating" min="1" max="10" value="5" required>
        </div>
            <button id="add_movie">Add Movie</button>
            <button id="clear_movies">Clear Movies</button>
    </div>
    
    <div id="display">
        <select name="movies" id="movies" multiple required></select><br>
        <button id="delete_movie">Delete Movie</button>
    </div>

    <div class="clear"></div>
    <p id="msg"></p>
       
    <script type="importmap">
        {
          "imports": {
            "storage": "./general_modules/storage.js",
            "DOM": "./general_modules/DOM.js",
            "movie":"./modules/movie.js",
            "movie_storage":"./modules/movie_storage.js",
            "movie_list":"./modules/movie_list.js"
          }
        }
    </script>
    <script src="movie_tracker.js" type="module"></script>
</body>
</html>
